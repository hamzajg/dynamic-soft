name: navigation
description: Core navigation verification across all platform sections
mode: validation
repos:
  - url: https://github.com/hamzajg/dynamic-soft
    type: monolith
    services:
      - name: web-app
        path: src/web-app
        type: frontend
        setup: bun install
        start: bun run start
        port: 3010
scenarios:
  - test_navigation_homepage
  - test_navigation_links
